{% metadata_file .yamato/package.metafile -%}
---

{% for editor in test_editors -%}
{% for platform in test_platforms -%}
test_{{ platform.name }}_{{ editor.version }}:
  name : Test {{ editor.version }} on {{ platform.name }}
  agent:
    type: {{ platform.type }}
    image: {{ platform.image }}
    flavor: {{ platform.flavor}}
  variables:
    UPMCI_PKG: "upm-ci-utils@stable"
  commands:
    - npm install {% if platform.name == "win" %}"%UPMCI_PKG%"{% else %}"$UPMCI_PKG"{% endif %} -g --registry {{ registry.npm }}
    - upm-ci package test -u {{ editor.version }} --type package-tests --extra-create-project-arg=-upmNoDefaultPackages
  artifacts:
    logs:
      paths:
        - "upm-ci~/test-results/**/*"
        - "upm-ci~/upm-ci.log"
  dependencies:
    - .yamato/package-pack.yml#pack
{% endfor -%}
{% endfor -%}

# Validate the package on each editor version and each platform
# Validation only occurs in editmode.
{% for editor in test_editors -%}
{% for platform in test_platforms -%}
validate_{{ platform.name }}_{{ editor.version }}:
  name : Validate {{ editor.version }} on {{ platform.name }}
  agent:
    type: {{ platform.type }}
    image: {{ platform.image }}
    flavor: {{ platform.flavor}}
  variables:
    UPMCI_PKG: "upm-ci-utils@stable"
  commands:
    - npm install {% if platform.name == "win" %}"%UPMCI_PKG%"{% else %}"$UPMCI_PKG"{% endif %} -g --registry {{ registry.npm }}
    - upm-ci package test -u {{ editor.version }} --type vetting-tests --platform editmode --extra-create-project-arg=-upmNoDefaultPackages
  artifacts:
    logs:
      paths:
        - "upm-ci~/test-results/**/*"
        - "upm-ci~/upm-ci.log"
  dependencies:
    - .yamato/package-pack.yml#pack
{% endfor -%}
{% endfor -%}

test_trigger:
  name: Package Tests Trigger
  triggers:
    branches:
      only:
      - "master"
    pull_requests:
      - targets:
          only:
            - "/.*/"
  dependencies:
    - .yamato/package-pack.yml#pack
{% for editor in test_editors -%}
{% for platform in test_platforms -%}
    - .yamato/package-test.yml#test_{{platform.name}}_{{editor.version}}
    - .yamato/package-test.yml#validate_{{platform.name}}_{{editor.version}}
{% endfor -%}
{% endfor -%}
