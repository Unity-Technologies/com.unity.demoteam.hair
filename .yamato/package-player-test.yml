{% metadata_file .yamato/package.metafile -%}
---
{% for editor in player_test_editors -%}
{% for platform in player_test_platforms -%}
{% if platform.build -%}
build_{{ platform.name }}_{{ editor.version }}:
  name : Build {{ editor.version }} {{ platform.name }} Player
  agent:
    type: {{ platform.build.type }}
    image: {{ platform.build.image }}
    flavor: {{ platform.build.flavor}}
  variables:
    {{ ps4_sdk }}
    {{ switch_sdk_1 }}
    {{ switch_sdk_2 }}
  commands:
    - npm install upm-ci-utils@stable -g --registry {{ registry.npm }}
    - upm-ci package test -u {{ editor.version }} --platform {{ platform.id }} --package-path package --extra-create-project-arg=-upmNoDefaultPackages --player-build-path upm-ci~/player/{{ platform.id }} --build-only {{platform.extra_test_args}}
  artifacts:
    logs:
      paths:
        - "**/*.log"
    player:
      paths:
        - "upm-ci~/player/{{ platform.id }}/**"
    test-results:
      paths:
        - "**/test-results/**"
  dependencies:
    - .yamato/package-pack.yml#pack
{% endif -%}
{% if platform.run -%}
run_{{ platform.name }}_{{ editor.version }}:
  name : Run {{ editor.version }} {{ platform.name }} Player Tests
  agent:
    type: {{ platform.run.type }}
    image: {{ platform.run.image }}
    flavor: {{ platform.run.flavor}}
  variables:
    {{ ps4_sdk }}
    {{ switch_sdk_1 }}
    {{ switch_sdk_2 }}
  commands:
    - npm install upm-ci-utils@stable -g --registry {{ registry.npm }}
    - upm-ci package test -u {{ editor.version }} --platform {{ platform.id }} --player-build-path upm-ci~/player/{{ platform.id }} --package-path package --extra-create-project-arg=-upmNoDefaultPackages {{platform.extra_test_args}}
  artifacts:
    logs:
      paths:
        - "**/*.log"
    test-results:
      paths:
        - "**/test-results/**"
  dependencies:
    - .yamato/package-pack.yml#pack
    - .yamato/package-player-test.yml#build_{{platform.name}}_{{editor.version}}
{% endif -%}
{% if platform.build_and_run -%}
build_and_run_{{ platform.name }}_{{ editor.version }}:
  name : Build and run {{ editor.version }} {{ platform.name }} Player Tests
  agent:
    type: {{ platform.build_and_run.type }}
    image: {{ platform.build_and_run.image }}
    flavor: {{ platform.build_and_run.flavor}}
  variables:
    {{ ps4_sdk }}
    {{ switch_sdk_1 }}
    {{ switch_sdk_2 }}
  commands:
    - npm install upm-ci-utils@stable -g --registry {{ registry.npm }}
    - upm-ci package test -u {{ editor.version }} --platform {{ platform.id }} --package-path package --extra-create-project-arg=-upmNoDefaultPackages {{platform.extra_test_args}}
  artifacts:
    logs:
      paths:
        - "**/*.log"
    test-results:
      paths:
        - "**/test-results/**"
  dependencies:
    - .yamato/package-pack.yml#pack
{% endif -%}
{% endfor -%}
{% endfor -%}

player_test_trigger:
  name: Package Player Tests Trigger
  dependencies:
{% for editor in player_test_editors -%}
{% for platform in player_test_platforms -%}
{% if platform.run -%}
    - .yamato/package-player-test.yml#run_{{platform.name}}_{{editor.version}}
{% elsif platform.build_and_run -%}
    - .yamato/package-player-test.yml#build_and_run_{{platform.name}}_{{editor.version}}
{% endif -%}
{% endfor -%}
{% endfor -%}
