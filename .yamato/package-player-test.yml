{% metadata_file .yamato/package.metafile -%}
---
{% for version in player_test_versions -%}
{% for platform in player_test_platforms -%}
{% if platform.build -%}
build_{{ platform.name }}_{{ version }}:
  name : Build {{ version }} {{ platform.name }} Player
  agent:
    type: {{ platform.build.type }}
    image: {{ platform.build.image }}
    flavor: {{ platform.build.flavor }}
  commands:
    - set %PS4_SDK_PATH_1%=%PS4_SDK_PATH_1_BEGIN%%PS4_SDK_{{ version | replace: ".", "_" }}%%PS4_SDK_PATH_1_END%
    - set %PS4_SDK_PATH_1%
    - set %PS5_SDK_PATH_1%=%PS5_SDK_PATH_1_BEGIN%%PS5_SDK_{{ version | replace: ".", "_" }}%%PS5_SDK_PATH_1_END%
    - set %PS5_SDK_PATH_1%
    - set %SWITCH_SDK_PATH_1%=%SWITCH_SDK_PATH_1_BEGIN%%SWITCH_SDK_{{ version | replace: ".", "_" }}%%SWITCH_SDK_PATH_1_END%
    - set %SWITCH_SDK_PATH_1%
    - set %SWITCH_SDK_PATH_2%=%SWITCH_SDK_PATH_2_BEGIN%%SWITCH_SDK_{{ version | replace: ".", "_" }}%%SWITCH_SDK_PATH_2_END%
    - set %SWITCH_SDK_PATH_2%
    - npm install upm-ci-utils@stable -g --registry {{ registry.npm }}
    - upm-ci package test -u {{ version }} --platform {{ platform.id }} --extra-create-project-arg=-upmNoDefaultPackages --player-build-path upm-ci~/player/{{ platform.id }} --build-only {{ platform.extra_test_args }}
  artifacts:
    logs:
      paths:
        - "**/*.log"
    player:
      paths:
        - "upm-ci~/player/{{ platform.id }}/**"
    test-results:
      paths:
        - "**/test-results/**"
  dependencies:
    - .yamato/package-pack.yml#pack
{% endif -%}
{% if platform.run -%}
run_{{ platform.name }}_{{ version }}:
  name : Run {{ version }} {{ platform.name }} Player Tests
  agent:
    type: {{ platform.run.type }}
    image: {{ platform.run.image }}
    flavor: {{ platform.run.flavor }}
  commands:
    - set %PS4_SDK_PATH_1%=%PS4_SDK_PATH_1_BEGIN%%PS4_SDK_{{ version | replace: ".", "_" }}%%PS4_SDK_PATH_1_END%
    - set %PS4_SDK_PATH_1%
    - set %PS5_SDK_PATH_1%=%PS5_SDK_PATH_1_BEGIN%%PS5_SDK_{{ version | replace: ".", "_" }}%%PS5_SDK_PATH_1_END%
    - set %PS5_SDK_PATH_1%
    - set %SWITCH_SDK_PATH_1%=%SWITCH_SDK_PATH_1_BEGIN%%SWITCH_SDK_{{ version | replace: ".", "_" }}%%SWITCH_SDK_PATH_1_END%
    - set %SWITCH_SDK_PATH_1%
    - set %SWITCH_SDK_PATH_2%=%SWITCH_SDK_PATH_2_BEGIN%%SWITCH_SDK_{{ version | replace: ".", "_" }}%%SWITCH_SDK_PATH_2_END%
    - set %SWITCH_SDK_PATH_2%
    - npm install upm-ci-utils@stable -g --registry {{ registry.npm }}
    - upm-ci package test -u {{ version }} --platform {{ platform.id }} --player-build-path upm-ci~/player/{{ platform.id }} --extra-create-project-arg=-upmNoDefaultPackages {{ platform.extra_test_args }}
  artifacts:
    logs:
      paths:
        - "**/*.log"
    test-results:
      paths:
        - "**/test-results/**"
  dependencies:
    - .yamato/package-pack.yml#pack
    - .yamato/package-player-test.yml#build_{{ platform.name }}_{{ version }}
{% endif -%}
{% if platform.build_and_run -%}
build_and_run_{{ platform.name }}_{{ version }}:
  name : Build and run {{ version }} {{ platform.name }} Player Tests
  agent:
    type: {{ platform.build_and_run.type }}
    image: {{ platform.build_and_run.image }}
    flavor: {{ platform.build_and_run.flavor }}
  commands:
    - set %PS4_SDK_PATH_1%=%PS4_SDK_PATH_1_BEGIN%%PS4_SDK_{{ version | replace: ".", "_" }}%%PS4_SDK_PATH_1_END%
    - set %PS4_SDK_PATH_1%
    - set %PS5_SDK_PATH_1%=%PS5_SDK_PATH_1_BEGIN%%PS5_SDK_{{ version | replace: ".", "_" }}%%PS5_SDK_PATH_1_END%
    - set %PS5_SDK_PATH_1%
    - set %SWITCH_SDK_PATH_1%=%SWITCH_SDK_PATH_1_BEGIN%%SWITCH_SDK_{{ version | replace: ".", "_" }}%%SWITCH_SDK_PATH_1_END%
    - set %SWITCH_SDK_PATH_1%
    - set %SWITCH_SDK_PATH_2%=%SWITCH_SDK_PATH_2_BEGIN%%SWITCH_SDK_{{ version | replace: ".", "_" }}%%SWITCH_SDK_PATH_2_END%
    - set %SWITCH_SDK_PATH_2%
    - npm install upm-ci-utils@stable -g --registry {{ registry.npm }}
    - upm-ci package test -u {{ version }} --platform {{ platform.id }} --extra-create-project-arg=-upmNoDefaultPackages {{ platform.extra_test_args }}
  artifacts:
    logs:
      paths:
        - "**/*.log"
    test-results:
      paths:
        - "**/test-results/**"
  dependencies:
    - .yamato/package-pack.yml#pack
{% endif -%}
{% endfor -%}
{% endfor -%}

player_test_trigger:
  name: Package Player Tests Trigger
  dependencies:
{% for version in player_test_versions -%}
{% for platform in player_test_platforms -%}
{% if platform.run -%}
    - .yamato/package-player-test.yml#run_{{ platform.name }}_{{ version }}
{% elsif platform.build_and_run -%}
    - .yamato/package-player-test.yml#build_and_run_{{ platform.name }}_{{ version }}
{% endif -%}
{% endfor -%}
{% endfor -%}
